
services:
  php:
    image: php:8.4-apache
    container_name: symfony_php
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y git unzip libicu-dev libzip-dev zip curl &&
      docker-php-ext-install pdo pdo_mysql intl zip &&
      a2enmod rewrite &&
      apache2-foreground
      "

  database:
    image: mysql:8.0
    container_name: symfony_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vite_gourmand
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: symfony_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: database
      MYSQL_ROOT_PASSWORD: root

volumes:
  db_data: